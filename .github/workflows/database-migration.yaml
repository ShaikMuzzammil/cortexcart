# ─────────────────────────────────────────────────────────────────
#  CortexCart — Database Migration
#  Runs `prisma db push` against Neon on every push to main/master
#  Also has a manual "Run workflow" button for emergencies
# ─────────────────────────────────────────────────────────────────
name: Database Migration

on:
  push:
    branches: [main, master]
    paths:
      - 'main/prisma/schema.prisma'   # only runs when schema changes
  workflow_dispatch:                  # manual trigger button in Actions tab

concurrency:
  group: db-migration
  cancel-in-progress: false          # never cancel an in-flight migration

jobs:
  migrate:
    name: Prisma DB Push → Neon
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main/package-lock.json

      - name: Install dependencies
        working-directory: main
        run: npm install --ignore-scripts

      - name: Generate Prisma Client
        working-directory: main
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Push schema to Neon database
        working-directory: main
        run: npx prisma db push --skip-generate --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Confirm tables
        working-directory: main
        run: |
          npx prisma db execute --stdin <<'SQL'
            SELECT table_name
            FROM information_schema.tables
            WHERE table_schema = 'public'
            ORDER BY table_name;
          SQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true       # don't fail the job if this step errors
