# ─────────────────────────────────────────────────────────────────
#  CortexCart — Database Migration & Seed (BACKUP / MANUAL PATH)
#
#  IMPORTANT: Vercel's build command for main/ already runs
#  `prisma db push && npm run db:seed` on every single deploy — so the
#  database is seeded automatically every time you push to GitHub and
#  Vercel redeploys. You do NOT need this workflow for normal seeding.
#
#  This workflow exists as a manual fallback: use the "Run workflow"
#  button in the Actions tab if you ever need to push schema/seed changes
#  to Neon WITHOUT triggering a full Vercel redeploy (e.g. testing a
#  schema change before deploying app code). Requires the DATABASE_URL
#  repo secret to be set (Settings → Secrets and variables → Actions).
# ─────────────────────────────────────────────────────────────────
name: Database Migration

on:
  push:
    branches: [main, master]
    paths:
      - 'main/prisma/schema.prisma'   # schema changes
      - 'main/prisma/seed.ts'         # catalog/category changes
  workflow_dispatch:                  # manual trigger button in Actions tab

concurrency:
  group: db-migration
  cancel-in-progress: false          # never cancel an in-flight migration

jobs:
  migrate:
    name: Prisma DB Push + Seed → Neon
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main/package-lock.json

      - name: Install dependencies
        working-directory: main
        run: npm install --ignore-scripts

      - name: Generate Prisma Client
        working-directory: main
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Push schema to Neon database
        working-directory: main
        run: npx prisma db push --skip-generate --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed catalog (categories + products, idempotent upsert)
        working-directory: main
        run: npm run db:seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Confirm tables
        working-directory: main
        run: |
          npx prisma db execute --stdin <<'SQL'
            SELECT table_name
            FROM information_schema.tables
            WHERE table_schema = 'public'
            ORDER BY table_name;
          SQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        continue-on-error: true       # don't fail the job if this step errors
