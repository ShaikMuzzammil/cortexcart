# ─────────────────────────────────────────────────────────────────
#  CortexCart — CI (Type-check + Lint)
#  Runs on every PR and push to main/master
#  Catches TypeScript errors BEFORE Vercel attempts to build
# ─────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-main:
    name: Type-check main/
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main/package-lock.json

      - name: Install deps
        working-directory: main
        run: npm install --ignore-scripts

      - name: Generate Prisma types
        working-directory: main
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@placeholder/placeholder' }}

      - name: TypeScript type-check
        working-directory: main
        run: npx tsc --noEmit

  typecheck-host:
    name: Type-check host/
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: host/package-lock.json

      - name: Install deps
        working-directory: host
        run: npm install --ignore-scripts

      - name: Generate Prisma types
        working-directory: host
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@placeholder/placeholder' }}

      - name: TypeScript type-check
        working-directory: host
        run: npx tsc --noEmit
